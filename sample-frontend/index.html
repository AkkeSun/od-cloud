<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Auth Sample</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { margin: 6px 4px; padding: 8px 16px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; }
    .label { font-weight: bold; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>HttpOnly Cookie Auth Sample</h2>

  <div class="label">1. 로그인 (토큰 발급)</div>
  <button onclick="login()">POST /auth</button>

  <div class="label">2. 토큰 재발급</div>
  <button onclick="reissueToken()">PUT /auth</button>

  <div class="label">3. 내 정보 조회</div>
  <button onclick="getMyInfo()">GET /accounts/self</button>

  <div class="label">응답</div>
  <pre id="result">-</pre>

  <script>
    const API = 'http://localhost:8080';

    // 핵심: credentials: 'include' → 브라우저가 쿠키를 자동으로 실어 보냄
    // 클라이언트는 토큰을 저장하거나 헤더에 직접 넣을 필요가 없음

    async function login() {
      // 실제로는 Google OAuth 후 받은 id_token을 넘김
      const googleToken = 'Bearer google-id-token-here';

      const res = await fetch(`${API}/auth`, {
        method: 'POST',
        credentials: 'include',           // ← 쿠키 자동 전송/수신 핵심
        headers: {
          'Content-Type': 'application/json',
          'googleAuthorization': googleToken,
        },
        body: JSON.stringify({ deviceId: 'web-browser' }),
      });

      const data = await res.json();
      show(data);
      // 응답 바디: { result: true }
      // accessToken, refreshToken은 브라우저가 Set-Cookie로 자동 저장
      // → JS에서는 토큰 값을 볼 수도, 건드릴 수도 없음
    }

    async function reissueToken() {
      const res = await fetch(`${API}/auth`, {
        method: 'PUT',
        credentials: 'include',           // ← refreshToken 쿠키 자동 전송
      });

      const data = await res.json();
      show(data);
      // 새 accessToken, refreshToken이 Set-Cookie로 자동 갱신됨
    }

    async function getMyInfo() {
      const res = await fetch(`${API}/accounts/self`, {
        method: 'GET',
        credentials: 'include',           // ← accessToken 쿠키 자동 전송
      });

      const data = await res.json();
      show(data);
      // 응답: { id, email, nickname, picture, groups, vouchers }
    }

    function show(data) {
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
